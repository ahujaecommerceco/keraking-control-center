<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KERAKING · Sign in</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%23D4AF37'/%3E%3C/svg%3E" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#F4F3EA; --panel:#fff; --line:#DAD7C6; --text:#141414; --muted:#6f7264; --gold:#D4AF37; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Montserrat,-apple-system,sans-serif; background:var(--bg); color:var(--text);
      display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .card { width:380px; max-width:92vw; background:var(--panel); border:1px solid var(--line); border-radius:14px;
      padding:32px; box-shadow:0 8px 30px rgba(0,0,0,.06); text-align:center; }
    .brand-svg { display:block; width:min(260px,80%); height:auto; margin:0 auto; }
    .tag { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.3em; margin:10px 0 24px; }
    label { display:block; text-align:left; font-size:12px; color:var(--muted); margin:14px 0 6px; }
    input { width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:10px; font-size:16px; font-family:inherit; outline:none; }
    input:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(212,175,55,.15); }
    .otp { letter-spacing:10px; text-align:center; font-size:22px; }
    button { width:100%; margin-top:18px; padding:12px; border:none; border-radius:10px; background:var(--gold); color:#1a1500;
      font-weight:700; font-size:15px; font-family:inherit; cursor:pointer; }
    button:disabled { opacity:.5; cursor:default; }
    .msg { margin-top:14px; font-size:13px; min-height:18px; }
    .msg.err { color:#c0392b; } .msg.ok { color:#1f9d57; }
    .back { margin-top:14px; background:none; border:none; color:var(--muted); font-size:12px; cursor:pointer; width:auto; padding:0; }
    .hidden { display:none; }
  </style>
</head>
<body>
  <div class="card">
    <svg class="brand-svg" viewBox="0 0 1120 220" xmlns="http://www.w3.org/2000/svg" aria-label="KERAKING">
      <defs>
        <linearGradient id="kkGoldLogin" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#F3DD8A" /><stop offset="0.5" stop-color="#D4AF37" /><stop offset="1" stop-color="#A8801C" />
        </linearGradient>
      </defs>
      <g transform="translate(110,110)">
        <circle r="100" fill="url(#kkGoldLogin)" />
        <circle r="99" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="2" />
        <g stroke="#161616" stroke-width="10" fill="none" stroke-linecap="round">
          <path d="M -10 -58 C 28 -40 26 -12 -4 2 C -32 16 -28 44 4 58" />
          <path d="M 18 -54 C 44 -34 38 -10 12 4 C -12 16 -8 40 16 54" />
        </g>
        <g fill="#161616"><path d="M -36 -4 L -32 0 L -36 4 L -40 0 Z" /><path d="M 36 8 L 40 12 L 36 16 L 32 12 Z" /></g>
      </g>
      <text x="258" y="150" font-family="'Cormorant Garamond', Georgia, serif" font-size="132" font-weight="700" letter-spacing="6" fill="#141414">KERAKING</text>
    </svg>
    <div class="tag">Control Center</div>

    <div id="step-email">
      <label>Work email</label>
      <input id="email" type="email" autocomplete="email" placeholder="you@kera-king.com" />
      <button id="sendBtn">Send login code</button>
    </div>

    <div id="step-otp" class="hidden">
      <label>Enter the 6-digit code sent to <span id="emailEcho"></span></label>
      <input id="otp" class="otp" inputmode="numeric" maxlength="6" placeholder="••••••" />
      <button id="verifyBtn">Verify &amp; sign in</button>
      <button id="backBtn" class="back">← use a different email</button>
    </div>

    <div id="msg" class="msg"></div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const msg = (t, ok) => { const m = $("msg"); m.textContent = t || ""; m.className = "msg " + (ok ? "ok" : "err"); };
    let email = "";

    async function post(url, body) {
      const r = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
      return r.json();
    }

    $("sendBtn").addEventListener("click", async () => {
      email = $("email").value.trim().toLowerCase();
      if (!email || !email.includes("@")) return msg("Enter a valid email.");
      $("sendBtn").disabled = true; msg("Sending…", true);
      try {
        const r = await post("/auth/otp/request", { email });
        $("emailEcho").textContent = email;
        $("step-email").classList.add("hidden"); $("step-otp").classList.remove("hidden"); $("otp").focus();
        msg(r.devCode ? ("Dev mode — your code is " + r.devCode) : "Code sent. Check your inbox.", true);
      } catch (e) { msg("Could not send code. Try again."); }
      $("sendBtn").disabled = false;
    });

    $("verifyBtn").addEventListener("click", async () => {
      const code = $("otp").value.trim();
      if (code.length !== 6) return msg("Enter the 6-digit code.");
      $("verifyBtn").disabled = true; msg("Verifying…", true);
      const r = await post("/auth/otp/verify", { email, code });
      if (r.ok) { msg("Signed in. Loading…", true); location.href = "/"; }
      else { msg(r.error || "Incorrect code."); $("verifyBtn").disabled = false; }
    });

    $("backBtn").addEventListener("click", () => {
      $("step-otp").classList.add("hidden"); $("step-email").classList.remove("hidden"); msg("");
    });
    $("otp").addEventListener("keydown", (e) => { if (e.key === "Enter") $("verifyBtn").click(); });
    $("email").addEventListener("keydown", (e) => { if (e.key === "Enter") $("sendBtn").click(); });
  </script>
</body>
</html>
